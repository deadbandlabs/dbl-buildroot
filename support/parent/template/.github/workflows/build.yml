#
# Calls dbl-buildroot's reusable workflows directly (pinned to the submodule SHA
# by `make update-dbl-buildroot`. Parent-layout cache paths are defaults but
# defaults but can be updated.
#
# Cachix pulls from the public `deadbandlabs` Nix cache by default (no secret),
# useful mainly for downloading the build shell environment dependencies.
#
# To push your own builds to your own Cachix account, set a CACHIX_AUTH_TOKEN
# repo secret and add:
#     secrets:
#       cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
#
# To disable cachix entirely, pass `cachix-cache: ""` in `with:`.
---
name: Build

"on":
  push:
    branches:
      - main
      - 'release/*'
  pull_request:
    branches:
      - main
      - 'release/*'
  workflow_dispatch:

"jobs":
  check:
    uses: deadbandlabs/dbl-buildroot/.github/workflows/check-reusable.yml@@@SUBMODULE_SHA@@

  release:
    needs: check
    uses: deadbandlabs/dbl-buildroot/.github/workflows/build-reusable.yml@@@SUBMODULE_SHA@@
    with:
      build-mode: nix-build
      project-name: @@PROJECT_NAME@@
      artifact-name: @@PROJECT_NAME@@-images

  debug:
    needs: check
    uses: deadbandlabs/dbl-buildroot/.github/workflows/build-reusable.yml@@@SUBMODULE_SHA@@
    with:
      build-mode: shell
      build-command: make debug
      project-name: @@PROJECT_NAME@@
      artifact-name: @@PROJECT_NAME@@-debug-images
