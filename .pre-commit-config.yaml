---
repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck -x
        language: system
        types: [shell]

      - id: shfmt
        name: shfmt
        entry: shfmt -w -i 2 -ci
        language: system
        types: [shell]

      - id: yamllint
        name: yamllint
        entry: yamllint -s -c .yamllint
        language: system
        files: \.(ya?ml)$

      - id: nixfmt
        name: nixfmt
        entry: nixfmt
        language: system
        files: \.nix$

      - id: no-tabs
        name: no tabs in repo text files
        entry: ./support/pre-commit/no-tabs.sh
        language: system
        files: (\.envrc|\.gitignore|\.pre-commit-config\.yaml|external\.desc|\.ya?ml|\.nix|\.sh|\.toml|\.cfg|\.conf|\.fragment|\.defconfig)$
        exclude: (^|/)Makefile$|\.patch$

      - id: dts-checkpatch
        name: dts checkpatch
        entry: ./support/pre-commit/checkpatch-dts.sh
        language: system
        files: \.dtsi?$

      - id: mdformat
        name: mdformat
        entry: mdformat
        language: system
        files: \.md$

      - id: commitizen-check
        name: commitizen check (warn only)
        entry: ./support/pre-commit/commit-msg-warn.sh
        language: system
        stages: [commit-msg]

      - id: reuse-lint
        name: reuse lint
        entry: reuse lint
        language: system
        pass_filenames: false
