#
# Reusable build engine used by both:
#   - this repo's own CI (uses: ./.github/workflows/build-reusable.yml)
#   - downstream parents, called directly with a pinned cross-repo ref
#     (uses: deadbandlabs/dbl-buildroot/.github/workflows/build-reusable.yml@<sha>)
#
# Defaults are provided for the PARENT project (dbl-buildroot as submodule) layout:
# parent.mk forwards OUTPUT_BASE=<parent root>, so output/, dl/, ccache exist at the
# parent root, and the lockfile/defconfig live under modules/dbl-buildroot/.
# The base repo overrides its own root-anchored layout.
#
# Cache keys are computed in a runtime `run:` step, not a caller `with:` block:
# Forgejo exposes no functions (incl. hashFiles) in the reusable-call `with:`
# context, so keys must be derived after checkout.
#
# Two build modes:
#   shell (default): `nix develop ...#ci --command <build-command>` (uses caches)
#   nix-build:       `nix build` (fully hermetic, no dl/ccache/host caches)
#
# Outputs:
#   images-dir  - path to images directory (empty if none built)
#   sdk-dir     - path to SDK directory (empty if SDK not requested)
---
name: Build (reusable)

'on':
  workflow_call:
    inputs:
      project-name:
        description: 'Name used to namespace cache keys and build outputs'
        type: string
        required: true
      checkout-submodules:
        description: 'Checkout submodules'
        type: boolean
        default: true
      nix-flake:
        description: 'Path to nix flake (parent uses .?submodules=1)'
        type: string
        default: '.?submodules=1'
      build-mode:
        description: "'shell' for nix develop + make, 'nix-build' for hermetic nix build"
        type: string
        default: 'shell'
      build-command:
        description: 'Build command run inside nix shell (ignored in nix-build mode)'
        type: string
        default: 'make'
      build-sdk:
        description: 'Also build the SDK (nix-build mode only)'
        type: boolean
        default: false
      images-path:
        description: 'Path to built images (shell mode)'
        type: string
        default: 'output/debug/images/'
      dl-cache-path:
        description: 'Download cache storage path'
        type: string
        default: 'dl/'
      dl-key-files:
        description: 'Space-separated paths/globs to hash for the download cache key'
        type: string
        default: 'modules/dbl-buildroot/buildroot.lock'
      ccache-path:
        description: 'Ccache storage path (parent default)'
        type: string
        default: 'output/ccache/'
      ccache-key-files:
        description: 'Space-separated paths/globs to hash for the ccache key'
        type: string
        default: >-
          modules/dbl-buildroot/buildroot.lock
          overlay/*.fragment
      host-cache-paths:
        description: 'Host toolchain cache storage paths (newline-separated). May be empty.'
        type: string
        default: |
          output/debug/host/
          output/debug/build/host-*/
      host-key-files:
        description: 'Space-separated paths/globs to hash for the host cache key. Empty = skip.'
        type: string
        default: >-
          modules/dbl-buildroot/buildroot.lock
          overlay/*.fragment
      cachix-cache:
        description: 'Cachix cache to pull/push. Empty = disable. No auth token = pull-only.'
        type: string
        default: 'deadbandlabs'
    outputs:
      images-dir:
        description: 'Path to the built images directory'
        value: ${{ jobs.build.outputs.images-dir }}
      sdk-dir:
        description: 'Path to the built SDK directory'
        value: ${{ jobs.build.outputs.sdk-dir }}
    secrets:
      cachix-auth-token:
        description: 'Cachix auth token for storing build cache (optional)'
        required: false
      github-external-token:
        description: 'github.com PAT for Nix flake fetch outside GH (optional)'
        required: false

'jobs':
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      images-dir: ${{ steps.pack.outputs.images-dir }}
      sdk-dir: ${{ steps.pack.outputs.sdk-dir }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}

      - name: Strip checkout credentials outside Github
        if: ${{ !contains(github.server_url, 'github.com') }}
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all url.https://github.com/.insteadOf || true

      - name: Compute cache keys
        id: keys
        if: ${{ inputs.build-mode == 'shell' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Hash the concatenation of every file matched by the given
          # space-separated path/glob list.
          hash_of() {
            # shellcheck disable=SC2206  # intentional word-split + glob
            local files=( $1 )
            if [ ${#files[@]} -eq 0 ]; then
              echo "::error::no files matched cache-key list: '$1'" >&2
              exit 1
            fi
            cat -- "${files[@]}" | sha256sum | cut -d' ' -f1
          }
          PFX='${{ inputs.project-name }}'
          {
            echo "dl=br-dl-${PFX}-$(hash_of '${{ inputs.dl-key-files }}')"
            echo "cc=br-cc-${PFX}-$(hash_of '${{ inputs.ccache-key-files }}')"
            if [ -n '${{ inputs.host-key-files }}' ]; then
              echo "host=br-host-${PFX}-$(hash_of '${{ inputs.host-key-files }}')"
            else
              echo "host="
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Allow user namespaces for buildFHSEnv
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        continue-on-error: true

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          # Set empty github.token or github-external-token used for Nix flake fetch in CI runs outside of github.com
          github_access_token: ${{ contains(github.server_url, 'github.com') && github.token || secrets.github-external-token }}
          nix_conf: |
            build-users-group =
            sandbox = false
            cores = 0
            # Build up-to 4 parallel derivations, matched to build users below
            max-jobs = 4

      # Selfhosted runners (including act) may run the job as root
      # Provision unprivileged nixbld users to match Github runner (no-op when non-root)
      - name: Use unprivileged build user
        shell: bash
        run: |
          if [ "$(id -u)" -eq 0 ]; then
            groupadd -r nixbld 2>/dev/null || true
            for i in $(seq 1 8); do
              id "nixbld$i" >/dev/null 2>&1 || \
                useradd -r -g nixbld -G nixbld -d /var/empty \
                  -s "$(command -v nologin || echo /bin/false)" "nixbld$i"
            done
            # NIX_CONFIG has highest precedence and overrides the empty
            # build-users-group set at install time; forward it to later steps.
            echo 'NIX_CONFIG=build-users-group = nixbld' >> "$GITHUB_ENV"
          fi

      - name: Setup Cachix
        if: ${{ inputs.cachix-cache != '' }}
        uses: cachix/cachix-action@v14
        with:
          name: ${{ inputs.cachix-cache }}
          authToken: ${{ secrets.cachix-auth-token }}

      # --- Shell-mode caches (skipped in nix-build mode) ---

      - name: Cache downloads
        if: ${{ inputs.build-mode == 'shell' }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.dl-cache-path }}
          key: ${{ steps.keys.outputs.dl }}
          restore-keys: br-dl-${{ inputs.project-name }}-

      - name: Cache host toolchain
        if: ${{ inputs.build-mode == 'shell' && steps.keys.outputs.host != '' }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.host-cache-paths }}
          key: ${{ steps.keys.outputs.host }}
          restore-keys: br-host-${{ inputs.project-name }}-

      - name: Clean host cache
        if: ${{ inputs.build-mode == 'shell' && steps.keys.outputs.host != '' }}
        run: |
          while IFS= read -r dir; do
            [ -n "$dir" ] && find "$dir" -name '*.la' -delete 2>/dev/null || true
          done <<< "${{ inputs.host-cache-paths }}"

      - name: Cache ccache
        if: ${{ inputs.build-mode == 'shell' }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.ccache-path }}
          key: ${{ steps.keys.outputs.cc }}
          restore-keys: br-cc-${{ inputs.project-name }}-

      # --- Build ---

      - name: Makefile build  # (build-mode = shell)
        if: ${{ inputs.build-mode == 'shell' }}
        run: nix develop '${{ inputs.nix-flake }}#ci' --command ${{ inputs.build-command }}

      - name: Nix build  # (build-mode = nix-build)
        if: ${{ inputs.build-mode == 'nix-build' }}
        run: nix build '${{ inputs.nix-flake }}' --print-build-logs

      - name: Build SDK  # (nix-build mode, opt-in)
        if: ${{ inputs.build-mode == 'nix-build' && inputs.build-sdk }}
        run: nix build '${{ inputs.nix-flake }}#sdk' --print-build-logs

      # --- Locate outputs ---

      - name: Locate build outputs
        id: pack
        shell: bash
        run: |
          set -euo pipefail

          resolve() {
            # shellcheck disable=SC2206  # intentional word-split
            local candidates=( $1 )
            for d in "${candidates[@]}"; do
              [ -d "$d" ] && [ -n "$(ls -A "$d" 2>/dev/null)" ] && { echo "$d"; return; }
            done
            echo ""
          }

          if [ '${{ inputs.build-mode }}' = 'nix-build' ]; then
            IMG_DIR="$(resolve 'result/images')"
            SDK_DIR="$(resolve 'result-sdk')"
          else
            IMG_DIR="$(resolve '${{ inputs.images-path }}')"
            SDK_DIR=""
          fi

          echo "images-dir=${IMG_DIR}" >> "$GITHUB_OUTPUT"
          echo "sdk-dir=${SDK_DIR}" >> "$GITHUB_OUTPUT"

          # Summary
          echo '### Build outputs' >> "$GITHUB_STEP_SUMMARY"
          [ -n "$IMG_DIR" ] && echo "- **Images:** \`$IMG_DIR\`" >> "$GITHUB_STEP_SUMMARY"
          [ -n "$SDK_DIR" ] && echo "- **SDK:** \`$SDK_DIR\`" >> "$GITHUB_STEP_SUMMARY"
