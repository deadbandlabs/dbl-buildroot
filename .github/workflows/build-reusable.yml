#
# Reusable build engine used by both:
#   - this repo's own CI (uses: ./.github/workflows/build-reusable.yml)
#   - downstream parents, called directly with a pinned cross-repo ref
#     (uses: deadbandlabs/dbl-buildroot/.github/workflows/build-reusable.yml@<sha>)
#
# Defaults are provided for the PARENT project (dbl-buildroot as submodule) layout:
# parent.mk forwards OUTPUT_BASE=<parent root>, so output/, dl/, ccache exist at the
# parent root, and the lockfile/defconfig live under modules/dbl-buildroot/.
# The base repo overrides its own root-anchored layout.
#
# Cache keys are computed in a runtime `run:` step, not a caller `with:` block:
# Forgejo exposes no functions (incl. hashFiles) in the reusable-call `with:`
# context, so keys must be derived after checkout.
#
# Two build modes:
#   shell (default): `nix develop ...#ci --command <build-command>` (uses caches)
#   nix-build:       `nix build` (fully hermetic, no dl/ccache/host caches)
---
name: Build (reusable)

"on":
  workflow_call:
    inputs:
      project-name:
        description: "Name used to namespace cache keys and build outputs"
        type: string
        required: true
      checkout-submodules:
        description: "Checkout submodules"
        type: boolean
        default: true
      nix-flake:
        description: "Path to nix flake (parent uses .?submodules=1)"
        type: string
        default: ".?submodules=1"
      build-mode:
        description: "'shell' for nix develop + make, 'nix-build' for hermetic nix build"
        type: string
        default: "shell"
      build-command:
        description: "Build command run inside nix shell (ignored in nix-build mode)"
        type: string
        default: "make"
      artifact-name:
        description: "Name for uploaded artifacts"
        type: string
        required: true
      images-path:
        description: "Path to built images for upload"
        type: string
        default: "output/debug/images/"
      dl-cache-path:
        description: "Download cache storage path"
        type: string
        default: "dl/"
      dl-key-files:
        description: "Space-separated paths/globs to hash for the download cache key"
        type: string
        default: "modules/dbl-buildroot/buildroot.lock"
      ccache-path:
        description: "Ccache storage path (parent default)"
        type: string
        default: "output/ccache/"
      ccache-key-files:
        description: "Space-separated paths/globs to hash for the ccache key"
        type: string
        default: >-
          modules/dbl-buildroot/buildroot.lock
          overlay/*.fragment
      host-cache-paths:
        description: "Host toolchain cache storage paths (newline-separated). May be empty."
        type: string
        default: |
          output/debug/host/
          output/debug/build/host-*/
      host-key-files:
        description: "Space-separated paths/globs to hash for the host cache key. Empty = skip."
        type: string
        default: >-
          modules/dbl-buildroot/buildroot.lock
          overlay/*.fragment
      cachix-cache:
        description: "Cachix cache to pull/push. Empty = disable. No auth token = pull-only."
        type: string
        default: "deadbandlabs"
    secrets:
      cachix-auth-token:
        description: "Cachix auth token (omit for pull-only)"
        required: false

"jobs":
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.checkout-submodules }}

      - name: Compute cache keys
        id: keys
        if: ${{ inputs.build-mode == 'shell' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Hash the concatenation of every file matched by the given
          # space-separated path/glob list.
          hash_of() {
            # shellcheck disable=SC2206  # intentional word-split + glob
            local files=( $1 )
            if [ ${#files[@]} -eq 0 ]; then
              echo "::error::no files matched cache-key list: '$1'" >&2
              exit 1
            fi
            cat -- "${files[@]}" | sha256sum | cut -d' ' -f1
          }
          PFX='${{ inputs.project-name }}'
          {
            echo "dl=br-dl-${PFX}-$(hash_of '${{ inputs.dl-key-files }}')"
            echo "cc=br-cc-${PFX}-$(hash_of '${{ inputs.ccache-key-files }}')"
            if [ -n '${{ inputs.host-key-files }}' ]; then
              echo "host=br-host-${PFX}-$(hash_of '${{ inputs.host-key-files }}')"
            else
              echo "host="
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Allow user namespaces for buildFHSEnv
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        continue-on-error: true

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            build-users-group =
            sandbox = false
            max-jobs = auto

      - name: Setup Cachix
        if: ${{ inputs.cachix-cache != '' }}
        uses: cachix/cachix-action@v14
        with:
          name: ${{ inputs.cachix-cache }}
          authToken: ${{ secrets.cachix-auth-token }}

      # --- Shell-mode caches (skipped in nix-build mode) ---

      - name: Cache downloads
        if: ${{ inputs.build-mode == 'shell' }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.dl-cache-path }}
          key: ${{ steps.keys.outputs.dl }}
          restore-keys: br-dl-${{ inputs.project-name }}-

      - name: Cache host toolchain
        if: ${{ inputs.build-mode == 'shell' && steps.keys.outputs.host != '' }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.host-cache-paths }}
          key: ${{ steps.keys.outputs.host }}
          restore-keys: br-host-${{ inputs.project-name }}-

      - name: Clean host cache
        if: ${{ inputs.build-mode == 'shell' && steps.keys.outputs.host != '' }}
        run: |
          while IFS= read -r dir; do
            [ -n "$dir" ] && find "$dir" -name '*.la' -delete 2>/dev/null || true
          done <<< "${{ inputs.host-cache-paths }}"

      - name: Cache ccache
        if: ${{ inputs.build-mode == 'shell' }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.ccache-path }}
          key: ${{ steps.keys.outputs.cc }}
          restore-keys: br-cc-${{ inputs.project-name }}-

      # --- Build ---

      - name: Makefile build  # (build-mode = shell)
        if: ${{ inputs.build-mode == 'shell' }}
        run: nix develop '${{ inputs.nix-flake }}#ci' --command ${{ inputs.build-command }}

      - name: Nix build  # (build-mode = nix-build)
        if: ${{ inputs.build-mode == 'nix-build' }}
        run: nix build '${{ inputs.nix-flake }}' --print-build-logs

      # --- Output ---

      - name: Copy nix build output
        if: ${{ inputs.build-mode == 'nix-build' }}
        run: |
          mkdir -p images
          cp -r result/images/. images/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.build-mode == 'nix-build' && 'images/' || inputs.images-path }}
          if-no-files-found: error
