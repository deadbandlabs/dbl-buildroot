---
name: Pre-commit checks

"on":
  push:
    branches: [main, "release/*", "dev/*"]
  pull_request:
    branches: [main, "release/*", "dev/*"]

"jobs":
  nix-env:
    name: Verify Nix devShell (fetch Linux source)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Nix environment
        uses: ./.github/actions/setup-nix

      - name: Cache Linux source download
        id: dl-cache
        uses: actions/cache@v5
        with:
          path: dl/
          key: br-dl-linux-${{ hashFiles('configs/myd_yf135_defconfig') }}

      # Smoke-test the devshell and Buildroot make on every run (no network).
      - name: Verify devshell and Buildroot make
        env:
          SKIP_TOOLCHAIN: 1
        run: nix develop .#ci --command bash -c 'make myd_yf135_defconfig'

      # Download latest linux-source (for dts-checkpatch) if cached download was not restored
      - name: Fetch Linux source
        if: steps.dl-cache.outputs.cache-hit != 'true'
        env:
          SKIP_TOOLCHAIN: 1
        run: nix develop .#ci --command bash -c 'make linux-source'

  pre-commit:
    name: Run pre-commit
    needs: nix-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Nix environment
        uses: ./.github/actions/setup-nix

      - name: Restore Linux source
        uses: actions/cache/restore@v5
        with:
          path: dl/
          key: br-dl-linux-${{ hashFiles('configs/myd_yf135_defconfig') }}

      - name: Set up pre-commit shell
        run: nix develop --option warn-dirty false .#pre-commit -c true

      - name: Run pre-commit hooks
        env:
          CZ_CHECK_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          output=$(./support/pre-commit.sh 2>&1) || status=$?
          echo "$output"
          {
            echo "## Pre-commit results"
            echo '```'
            echo "$output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${status:-0}"
