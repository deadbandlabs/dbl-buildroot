---
name: Build

"on":
  push:
    branches:
      - main
      - "release/*"

  pull_request:
    branches:
      - main
      - "release/*"

  workflow_dispatch:

"jobs":
  lockfile:
    name: Check lockfile is up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Allow user namespaces for buildFHSEnv
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        continue-on-error: true  # not available with act

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            build-users-group =
            sandbox = false
            max-jobs = auto

      - uses: cachix/cachix-action@v14
        with:
          name: deadbandlabs
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Check flake.lock is updated
        run: nix flake lock --no-update-lock-file

      - name: Regenerate lockfile
        run: make nix-lock

      - name: Check buildroot.lock is updated
        run: |
          if ! git diff --exit-code buildroot.lock; then
            echo "::error::buildroot.lock is out of date. Run 'make nix-lock' and commit the result."
            exit 1
          fi

  image:
    name: Build release image (nix)
    needs: lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        id: build
        uses: ./.github/actions/build
        with:
          build-mode: nix-build
          nix-flake: .
          project-name: dbl-buildroot
          build-sdk: true
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Upload image artifacts
        if: ${{ steps.build.outputs.images-dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: myd-yf135-images
          path: ${{ steps.build.outputs.images-dir }}/
          if-no-files-found: error

      - name: Upload SDK artifacts
        if: ${{ steps.build.outputs.sdk-dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: myd-yf135-sdk
          path: ${{ steps.build.outputs.sdk-dir }}/
          if-no-files-found: error

  debug:
    name: Build debug image (make)
    needs: lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        id: build
        uses: ./.github/actions/build
        with:
          build-mode: shell
          nix-flake: .
          build-command: make SHARE_HOST_FOR_DEBUG=0 debug  # No release build; do not share host toolchain
          project-name: dbl-buildroot
          images-path: output/debug/images/
          dl-cache-path: dl/
          ccache-path: output/ccache/
          host-cache-paths: |
            output/debug/host/
            output/debug/build/host-*/
          dl-key-files: buildroot.lock
          ccache-key-files: >-
            configs/myd_yf135_defconfig
            configs/myd_yf135_debug.fragment
            board/myd-yf135/linux.config
            board/myd-yf135/linux-debug.fragment
            board/myd-yf135/uboot.config
            board/myd-yf135/uboot-debug.fragment
          host-key-files: >-
            buildroot.lock
            configs/myd_yf135_defconfig
            configs/myd_yf135_debug.fragment
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Upload debug image artifacts
        if: ${{ steps.build.outputs.images-dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: myd-yf135-debug-images
          path: ${{ steps.build.outputs.images-dir }}/
          if-no-files-found: error
