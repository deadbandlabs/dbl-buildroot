#
# Reusable submodule-consistency gate for downstream parents.
#
# Runs in the caller's repo context, with `make check-dbl-buildroot` to
# verify the parent's SHA pins (see update.sh, check-pinned-shas.sh):
#
#   check:
#     uses: deadbandlabs/dbl-buildroot/.github/workflows/check-reusable.yml@<sha>
---
name: Submodule check (reusable)

"on":
  workflow_call:

"jobs":
  check:
    name: Submodule consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - run: make check-dbl-buildroot
