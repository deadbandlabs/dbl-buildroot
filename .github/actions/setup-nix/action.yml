#
# Shared Nix/CI environment bring-up used by the build and lockfile composite
# actions (and, transitively, this repo's CI + downstream parents).
#
# Handles the setup that is identical across every dbl-buildroot CI job:
#   - strip checkout credentials when running outside github.com
#   - allow unprivileged user namespaces for buildFHSEnv
#   - install Nix
#   - provision unprivileged nixbld users on root runners (act/Forgejo)
#   - optionally configure Cachix
---
name: 'dbl-buildroot setup-nix'
description: 'Install Nix and prepare the CI environment for a dbl-buildroot build'

inputs:
  max-jobs:
    description: 'Nix max-jobs (parallel derivations)'
    default: 'auto'
  cores:
    description: 'Nix cores per derivation (empty = Nix default; 0 = all)'
    default: ''
  cachix-cache:
    description: 'Cachix cache to pull/push. Empty = disable'
    default: 'deadbandlabs'
  cachix-auth-token:
    description: 'Cachix auth token (optional, enables push)'
    default: ''
  github-external-token:
    description: 'github.com PAT for Nix flake fetch outside GH (optional)'
    default: ''

runs:
  using: composite
  steps:
    - name: Strip checkout credentials outside Github
      if: ${{ !contains(github.server_url, 'github.com') }}
      shell: bash
      run: |
        git config --local --unset-all http.https://github.com/.extraheader || true
        git config --global --unset-all http.https://github.com/.extraheader || true
        git config --global --unset-all url.https://github.com/.insteadOf || true

    - name: Allow user namespaces for buildFHSEnv
      shell: bash
      run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@v34
      with:
        # Empty github.token falls back to github-external-token, used for
        # Nix flake fetch in CI runs outside of github.com
        github_access_token: ${{ contains(github.server_url, 'github.com') && github.token || inputs.github-external-token }}
        nix_conf: |
          build-users-group =
          sandbox = false
          max-jobs = ${{ inputs.max-jobs }}
          ${{ inputs.cores != '' && format('cores = {0}', inputs.cores) || '' }}

    # Selfhosted runners (including act) may run the job as root
    # Provision unprivileged nixbld users to match Github runner (no-op when non-root)
    - name: Use unprivileged build user
      shell: bash
      run: |
        if [ "$(id -u)" -eq 0 ]; then
          groupadd -r nixbld 2>/dev/null || true
          for i in $(seq 1 8); do
            id "nixbld$i" >/dev/null 2>&1 || \
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s "$(command -v nologin || echo /bin/false)" "nixbld$i"
          done
          # NIX_CONFIG has highest precedence and overrides the empty
          # build-users-group set at install time; forward it to later steps.
          echo 'NIX_CONFIG=build-users-group = nixbld' >> "$GITHUB_ENV"
        fi

    - name: Setup Cachix
      if: ${{ inputs.cachix-cache != '' }}
      uses: cachix/cachix-action@v14
      with:
        name: ${{ inputs.cachix-cache }}
        authToken: ${{ inputs.cachix-auth-token }}
